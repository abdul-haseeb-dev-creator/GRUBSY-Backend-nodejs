# Prometheus Alert Rules for Grubsy Platform
groups:
  - name: grubsy.application
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m]) /
            rate(http_requests_total[5m])
          ) * 100 > 5
        for: 2m
        labels:
          severity: critical
          service: grubsy-backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% for the last 5 minutes"

      # High response time alert
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 3m
        labels:
          severity: warning
          service: grubsy-backend
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s"

      # Service down alert
      - alert: ServiceDown
        expr: up{job="grubsy-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: grubsy-backend
        annotations:
          summary: "Grubsy Backend service is down"
          description: "Grubsy Backend has been down for more than 1 minute"

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_usage_bytes{name="grubsy-backend"} /
            container_spec_memory_limit_bytes{name="grubsy-backend"}
          ) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: grubsy-backend
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          rate(container_cpu_usage_seconds_total{name="grubsy-backend"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: grubsy-backend
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      # Database connection issues
      - alert: DatabaseConnectionIssues
        expr: |
          increase(database_connection_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection issues"
          description: "{{ $value }} database connection errors in the last 5 minutes"

  - name: grubsy.infrastructure
    rules:
      # Redis down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"

      # High Redis memory usage
      - alert: RedisHighMemoryUsage
        expr: |
          (
            redis_memory_used_bytes /
            redis_memory_max_bytes
          ) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value }}%"

      # Nginx down
      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
          service: nginx
        annotations:
          summary: "Nginx is down"
          description: "Nginx has been down for more than 1 minute"

      # High disk usage
      - alert: HighDiskUsage
        expr: |
          (
            (node_filesystem_size_bytes - node_filesystem_avail_bytes) /
            node_filesystem_size_bytes
          ) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High disk usage"
          description: "Disk usage is {{ $value }}% on {{ $labels.device }}"

      # System load high
      - alert: SystemLoadHigh
        expr: node_load1 > 2
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "System load is high"
          description: "System load is {{ $value }}"

  - name: grubsy.business
    rules:
      # Low order rate
      - alert: LowOrderRate
        expr: |
          rate(orders_created_total[1h]) < 10
        for: 30m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low order rate detected"
          description: "Order rate is {{ $value }} orders per hour"

      # High order failure rate
      - alert: HighOrderFailureRate
        expr: |
          (
            rate(orders_failed_total[5m]) /
            rate(orders_total[5m])
          ) * 100 > 10
        for: 5m
        labels:
          severity: critical
          service: business
        annotations:
          summary: "High order failure rate"
          description: "Order failure rate is {{ $value }}%"

      # Payment processing issues
      - alert: PaymentProcessingIssues
        expr: |
          rate(payment_failures_total[5m]) > 5
        for: 3m
        labels:
          severity: critical
          service: payments
        annotations:
          summary: "Payment processing issues"
          description: "{{ $value }} payment failures per second"

  - name: grubsy.security
    rules:
      # Too many failed login attempts
      - alert: TooManyFailedLogins
        expr: |
          rate(auth_failed_attempts_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "Too many failed login attempts"
          description: "{{ $value }} failed login attempts per second"

      # Suspicious API usage
      - alert: SuspiciousAPIUsage
        expr: |
          rate(http_requests_total{status="429"}[5m]) > 50
        for: 1m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "Suspicious API usage detected"
          description: "High rate of 429 responses: {{ $value }} per second"

  - name: grubsy.deployment
    rules:
      # Deployment in progress
      - alert: DeploymentInProgress
        expr: |
          deployment_status{status="in_progress"} == 1
        for: 0m
        labels:
          severity: info
          service: deployment
        annotations:
          summary: "Deployment in progress"
          description: "Deployment is currently in progress for {{ $labels.environment }}"

      # Deployment failed
      - alert: DeploymentFailed
        expr: |
          deployment_status{status="failed"} == 1
        for: 0m
        labels:
          severity: critical
          service: deployment
        annotations:
          summary: "Deployment failed"
          description: "Deployment failed for {{ $labels.environment }}"

      # Rollback triggered
      - alert: RollbackTriggered
        expr: |
          rollback_status{status="triggered"} == 1
        for: 0m
        labels:
          severity: critical
          service: deployment
        annotations:
          summary: "Rollback triggered"
          description: "Rollback has been triggered for {{ $labels.environment }}"